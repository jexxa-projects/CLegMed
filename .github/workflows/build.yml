name: SonarQube
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones disabled for better analysis relevancy

      - name: Setup CMake 4
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '4.x'

      # 1. Benötigte Tools installieren (Compiler, CMake und Gcovr für die Testabdeckung)
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcovr

      # 2. SonarCloud Build Wrapper installieren
      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v4

      # 3. CMake konfigurieren (mit Code Coverage Flags)
      - name: Configure CMake
        run: |
          mkdir build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="--coverage"

      # 4. Framework bauen (Überwacht durch den Build Wrapper)
      - name: Build with Build Wrapper
        run: |
          build-wrapper-linux-x86-64 --out-dir bw-output cmake --build build

      # 5. Unit Tests ausführen, um Coverage-Rohdaten zu generieren
      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure

      # 6. Coverage-Rohdaten in das SonarQube-XML-Format konvertieren
      - name: Generate Coverage Report
        run: |
          gcovr --sonarqube build/coverage.xml -r . --object-directory build

      # 7. SonarCloud Scan ausführen und die generierten Berichte übergeben
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.cfamily.compile-commands=bw-output/compile_commands.json
            -Dsonar.coverageReportPaths=build/coverage.xml
