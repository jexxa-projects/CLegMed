sonar.projectKey=jexxa-projects_CLegMed
sonar.organization=jexxa-projects

# 1. Das gesamte Projekt als Quelle definieren (damit findet er die .cpp der Tests)
sonar.sources=.

# 2. Den Build-Ordner und externe Abhängigkeiten komplett für den Scanner ignorieren
sonar.exclusions=build/**, bw-output/**, .github/**

# 3. Den Tests-Ordner als offiziellen Testcode deklarieren
sonar.tests=tests

# 4. Coverage NUR für das include-Verzeichnis erlauben (alles andere wird ausgeschlossen)
sonar.coverage.exclusions=**
sonar.coverage.inclusions=include/**

# 5. Header-Analyse erzwingen
sonar.cfamily.headerRequirement=All
